<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Product</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Update Product</h1>
        <form method="POST">
            <label for="product_name">Product Name:</label>
            <input type="text" id="product_name" name="product_name" value="{{ product['product_name'] }}" required>
        
            <label for="image_url">Image URL:</label>
            <input type="text" name="image_url" id="image_url" value="{{ product.image_url }}" required>
        
            <label for="price">Price:</label>
            <input type="number" id="price" name="price" value="{{ product['price'] }}" step="0.01" required>
        
            <label for="stock">Stock:</label>
            <input type="number" id="stock" name="stock" value="{{ product['stock_quantity'] }}" required>
        
            <label for="description">Description:</label>
            <textarea id="description" name="description" rows="4" required>{{ product['description'] }}</textarea>
        
            <label for="steps_to_grow">Steps to Grow:</label>
            <textarea id="steps_to_grow" name="steps_to_grow" rows="4">{{ product['steps_to_grow'] }}</textarea>
        
            <button type="submit">Update Product</button>
        </form>        
    </div>
</body>
</html>
