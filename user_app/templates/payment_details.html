<form method="post" action="{{ url_for('payment_details') }}">
    <input type="hidden" id="total" name="total" value="{{ request.args.get('total', session.get('total_price', '') or '') }}">
    <input type="text" name="card_number" placeholder="Card Number" required>
    <input type="text" name="expiry_date" placeholder="MM/YY" required>
    <input type="text" name="cvv" placeholder="CVV" required>
    <input type="text" name="cardholder_name" placeholder="Cardholder Name" required>
    <button type="submit">Pay</button>
</form>

<script>
    document.querySelector("form").addEventListener("submit", function(event) {
        const cardNumber = document.getElementById("card_number").value.trim();
        const expiryDate = document.getElementById("expiry_date").value.trim();
        const cvv = document.getElementById("cvv").value.trim();
        const cardholderName = document.getElementById("cardholder_name").value.trim();
    
        if (!/^\d{16}$/.test(cardNumber)) {
            alert("Card number must be 16 digits.");
            event.preventDefault();
        } else if (!/^\d{2}\/\d{2}$/.test(expiryDate)) {
            alert("Expiry date must be in MM/YY format.");
            event.preventDefault();
        } else if (!/^\d{3,4}$/.test(cvv)) {
            alert("CVV must be 3 or 4 digits.");
            event.preventDefault();
        } else if (cardholderName === "") {
            alert("Cardholder name is required.");
            event.preventDefault();
        }
    });
    </script>
