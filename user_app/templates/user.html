<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Page</title>
</head>
<body>
    <h1>Welcome, {{ user.username }}</h1>
    <p>Email: {{ user.email }}</p>

    <h2>Order History</h2>
    <ul>
        {% for order in orders %}
        <li>{{ order.product }} - {{ order.date }} - {{ order.status }}</li>
        {% endfor %}
    </ul>

    <h2>Cart</h2>
    <ul>
        {% for item in cart %}
        <li>{{ item.product }} - Quantity: {{ item.quantity }}</li>
        {% endfor %}
    </ul>
</body>
</html>
