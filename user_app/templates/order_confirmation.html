<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #F6F7F2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .confirmation-container {
            text-align: center;
            background-color: #F6F7F2;
            padding: 20px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .confirmation-container h1 {
            color: #588456;
        }
        .confirmation-container p {
            color: #333333;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #588456;
            color: #F6F7F2;
            text-decoration: none;
            border-radius: 4px;
        }
        .btn:hover {
            background-color: #588456;
        }
    </style>
</head>
<body>
    <div class="confirmation-container">
        <h1>Thank You!</h1>
        <p>Your order has been successfully placed.</p>
        <p>We appreciate your purchase. If you have any questions, feel free to reach out.</p>
        <p><strong>Razorpay Order ID:</strong> {{ razorpay_order_id }}</p>
        <p><strong>Payment ID:</strong> {{ payment_id }}</p>
        <p><strong>Total Price:</strong> ₹{{ total_price }}</p>
        <a href="{{ url_for('view_cart') }}" class="btn">Continue Shopping</a>
    </div>
</body>
</html>
